# Terminal
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Core Behavior
## Change prefix from Ctrl+B to Ctrl+Space.
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

## Don't wait for an escape sequence after the prefix.
set -g escape-time 0

## Increase scrollback buffer size.
set -g history-limit 50000

## Start window and pane numbering at 1 (not 0) — easier to reach on keyboard.
set -g base-index 1
setw -g pane-base-index 1

## Re-number windows when one is closed.
set -g renumber-windows on

## Propagate focus events to programs inside tmux (e.g. Neovim's autoread).
set -g focus-events on

## Update window title in the terminal emulator.
set -g set-titles on
set -g set-titles-string "#S / #W"

# Mouse
set -g mouse on

# Vi Mode
## Use vi keys in copy mode (the buffer/scroll mode).
setw -g mode-keys vi

## Vim-like visual select and yank in copy mode.
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel

# Pane Navigation (Vim-like)
## Move between panes with h/j/k/l (without prefix in this variant,
## but we keep prefix+hjkl to avoid conflicting with Vim inside a pane).
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

## Resize panes with Shift+hjkl (repeatable).
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Window / Pane Management
## Split with | (vertical) and - (horizontal), opening in current path.
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

## New window opens in current path.
bind c new-window -c "#{pane_current_path}"

## Reload config without restarting.
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# Status Bar — Zuppuccin Mocha
## Palette
zuppuccin_base="#1f1e2e"
zuppuccin_surface="#47475a"
zuppuccin_overlay="#5a5b70"
zuppuccin_muted="#a8acc8"
zuppuccin_text="#cfd5f4"
zuppuccin_accent="#c7abdf"
zuppuccin_green="#93e5b6"
zuppuccin_blue="#9eaffd"

set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-style "bg=#{zuppuccin_base},fg=#{zuppuccin_text}"

## Left: session name
set -g status-left-length 40
set -g status-left "#[bg=#{zuppuccin_accent},fg=#{zuppuccin_base},bold] #S #[bg=#{zuppuccin_base},fg=#{zuppuccin_accent}]"

## Right: date and time
set -g status-right-length 60
set -g status-right "#[fg=#{zuppuccin_muted}] %Y-%m-%d #[fg=#{zuppuccin_text},bold]%H:%M "

## Window list — centered
set -g status-justify centre

## Window format: inactive
setw -g window-status-format " #I #W "
setw -g window-status-style "fg=#{zuppuccin_muted},bg=#{zuppuccin_base}"

## Window format: active
setw -g window-status-current-format "#[bg=#{zuppuccin_surface},fg=#{zuppuccin_text},bold] #I #W "
setw -g window-status-current-style "bg=#{zuppuccin_surface},fg=#{zuppuccin_text},bold"

## Pane borders
set -g pane-border-style "fg=#{zuppuccin_surface}"
set -g pane-active-border-style "fg=#{zuppuccin_accent}"

## Message bar (bottom left on prefix commands)
set -g message-style "bg=#{zuppuccin_accent},fg=#{zuppuccin_base},bold"

# Source platform-specific overrides.
if-shell "uname | grep -q Darwin" "source ~/.config/tmux/macos.conf"
if-shell "uname | grep -q Linux" "source ~/.config/tmux/linux.conf"
