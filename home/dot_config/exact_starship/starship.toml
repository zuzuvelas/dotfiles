"$schema" = 'https://starship.rs/config-schema.json'

# Active palette вҖ” change to zuppuccin_latte when using the light terminal theme
palette = 'zuppuccin_mocha'

# Two-line prompt
# Left  вҖ” powerline: OS вҶ’ directory вҶ’ git вҶ’ cmd_duration
# Right вҖ” runtime versions: JVM group (green) В· scripting group (sapphire)
format = """
[оӮ¶](mauve)\
$os\
$username\
[оӮ°](bg:peach fg:mauve)\
$directory\
[оӮ°](bg:yellow fg:peach)\
$git_branch\
$git_status\
[оӮҙ](fg:yellow)\
$cmd_duration\
$line_break\
$character"""

right_format = "$java$kotlin$swift  $nodejs$ruby$python "

add_newline = true

[package]
disabled = true

# в”Җв”Җ Palettes в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

