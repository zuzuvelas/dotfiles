Ubuntu = "пҢӣ"

# Arch-based
Manjaro = "пҢ’"
EndeavourOS = "пҢў"
Garuda = "пҢ·"

# Debian-based
Debian = "пҢҶ"
Mint = "у°Јӯ"
Pop = "пҢӘ"

# RPM-based
Fedora = "пҢҠ"
CentOS = "пҢ„"
Redhat = "пҢ–"
RedHatEnterprise = "пҢ–"

# Other notable
NixOS = "пҢ“"
Gentoo = "пҢҚ"
Alpine = "пҢҖ"

# Generic fallbacks
Linux = "у°ҢҪ"
Android = "оңҺ"
