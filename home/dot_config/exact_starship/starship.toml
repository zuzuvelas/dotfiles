"$schema" = 'https://starship.rs/config-schema.json'

# Active palette — change to zuppuccin_latte when using the light terminal theme
palette = 'zuppuccin_mocha'

# Two-line prompt
# Left  — powerline: OS → directory → git → cmd_duration
# Right — runtime versions: JVM group (green) · scripting group (sapphire)
format = """
[](mauve)\
$os\
$username\
[](bg:peach fg:mauve)\
$directory\
[](bg:yellow fg:peach)\
$git_branch\
$git_status\
[](fg:yellow)\
$cmd_duration\
$line_break\
$character"""

right_format = "$java$kotlin$swift  $nodejs$ruby$python"

add_newline = true

[package]
disabled = true

# ── Palettes ──────────────────────────────────────────────────────────────────

[palettes.zuppuccin_mocha]
rosewater = "#f4e0e0"
flamingo  = "#efcdd5"
pink      = "#ecc4f0"
mauve     = "#c7abdf"
red       = "#ea8dc1"
maroon    = "#e5a1bd"
peach     = "#feb097"
yellow    = "#ffdfb8"
green     = "#93e5b6"
teal      = "#92e1e4"
sky       = "#90d9f7"
sapphire  = "#83c3f6"
blue      = "#9eaffd"
lavender  = "#c4b9fc"
text      = "#cfd5f4"
subtext1  = "#bcc1de"
subtext0  = "#a8acc8"
overlay2  = "#9598b2"
overlay1  = "#81839c"
overlay0  = "#6e6f86"
surface2  = "#5a5b70"
surface1  = "#47475a"
surface0  = "#323244"
base      = "#1f1e2e"
mantle    = "#191825"
crust     = "#12111b"

[palettes.zuppuccin_latte]
rosewater = "#db898c"
flamingo  = "#d97891"
pink      = "#d97ce7"
mauve     = "#7e6695"
red       = "#cf0068"
maroon    = "#e3427d"
peach     = "#ff6050"
yellow    = "#eb863a"
green     = "#00a25a"
teal      = "#2390a7"
sky       = "#4a9ff1"
sapphire  = "#379cc3"
blue      = "#605af3"
lavender  = "#927ef9"
text      = "#4e4e69"
subtext1  = "#5e5e77"
subtext0  = "#6e6e85"
overlay2  = "#7e7f93"
overlay1  = "#8d8fa1"
overlay0  = "#9da0b0"
surface2  = "#adb0be"
surface1  = "#bdc0cc"
surface0  = "#cdd0da"
base      = "#eff1f5"
mantle    = "#e7e9ef"
crust     = "#dde0e8"

# ── OS + identity ─────────────────────────────────────────────────────────────

[os]
disabled = false
style = "bg:mauve fg:crust"
format = "[ $symbol ]($style)"

[os.symbols]
# macOS / Windows
Macos   = ""
Windows = ""

# Primary Linux installs
Arch    = "󰣇"
CachyOS = " "
Ubuntu  = ""

# Arch-based
Manjaro     = ""
EndeavourOS = ""
Garuda      = ""

# Debian-based
Debian = ""
Mint   = "󰣭"
Pop    = ""

# RPM-based
Fedora              = ""
CentOS              = ""
Redhat              = ""
RedHatEnterprise    = ""

# Other notable
NixOS  = ""
Gentoo = ""
Alpine = ""

# Generic fallbacks
Linux   = "󰌽"
Android = ""
Unknown = " "

[username]
style_user = "bg:mauve fg:crust"
style_root = "bg:mauve fg:red"
format = '[$user ]($style)'

# ── Directory ─────────────────────────────────────────────────────────────────

[directory]
style = "bg:peach fg:crust"
format = "[ $path$read_only ]($style)"
truncation_length = 4
truncation_symbol = "…/"
read_only = " 󰌾"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = "󰝚 "
"Pictures" = " "
"Developer" = "󰲋 "

# ── Git ───────────────────────────────────────────────────────────────────────

[git_branch]
symbol = ""
style = "bg:yellow"
format = '[[ $symbol $branch ](fg:crust bg:yellow)]($style)'
truncation_length = 30
truncation_symbol = "…"

[git_status]
style = "bg:yellow"
format = '[[($ahead_behind$staged$modified$untracked )](fg:crust bg:yellow)]($style)'
ahead      = "⇡$count"
behind     = "⇣$count"
diverged   = "⇕"
staged     = " +$count"
modified   = " ~$count"
untracked  = " ?$count"
deleted    = " -$count"
conflicted = " =$count"
renamed    = " »$count"
stashed    = ""

# ── Command duration ──────────────────────────────────────────────────────────

[cmd_duration]
min_time    = 2_000
format      = "  [$duration](overlay1)"

# ── Prompt character ──────────────────────────────────────────────────────────

[character]
success_symbol = "[❯](bold mauve)"
error_symbol   = "[❯](bold red)"
vimcmd_symbol  = "[❮](bold green)"

# ── JVM / Native ──────────────────────────────────────────────────────────────

[java]
symbol = " "
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'
detect_files = [
  "pom.xml",
  "build.gradle",
  "build.gradle.kts",
  "settings.gradle",
  "settings.gradle.kts",
  ".java-version",
]

[kotlin]
symbol = ""
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[swift]
symbol = "󰛥"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

# ── Web / Scripting ───────────────────────────────────────────────────────────

[nodejs]
symbol = "󰎙"
style = "bg:sapphire"
format = '[[ $symbol( $version) ](fg:crust bg:sapphire)]($style)'
detect_files   = ["package.json", ".nvmrc", ".node-version"]
detect_folders = ["node_modules"]

[ruby]
symbol = "󰴭"
style = "bg:sapphire"
format = '[[ $symbol( $version) ](fg:crust bg:sapphire)]($style)'
detect_files = ["Gemfile", "Fastfile", ".ruby-version"]

[python]
symbol = "󰌠"
style = "bg:sapphire"
format = '[[ $symbol( $version) ](fg:crust bg:sapphire)]($style)'

# ── Misc Languages — remove `disabled` line and move to right_format to activate ────

[golang]
symbol = ""
style = "bg:teal"
format = '[[ $symbol( $version) ](fg:crust bg:teal)]($style)'
disabled = true

[rust]
symbol = ""
style = "bg:peach"
format = '[[ $symbol( $version) ](fg:crust bg:peach)]($style)'
disabled = true

[conda]
symbol = "  "
style = "bg:sapphire fg:crust"
format = '[[ $symbol$environment ](fg:crust bg:sapphire)]($style) '
disabled = true
