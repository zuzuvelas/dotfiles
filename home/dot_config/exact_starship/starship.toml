[username]
style_user = "bg:mauve fg:crust"
style_root = "bg:mauve fg:red"
format = '[$user ]($style)'

# в”Җв”Җ Directory в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

[directory]
style = "bg:peach fg:crust"
format = "[ $path$read_only ]($style)"
truncation_length = 4
truncation_symbol = "вҖҰ/"
read_only = " у°Ңҫ"

[directory.substitutions]
"Documents" = "у°Ҳҷ "
"Downloads" = "пҖҷ "
"Music" = "у°қҡ "
"Pictures" = "пҖҫ "
"Developer" = "у°ІӢ "

# в”Җв”Җ Git в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

[git_branch]
symbol = "пҗҳ"
style = "bg:yellow"
format = '[[ $symbol $branch ](fg:crust bg:yellow)]($style)'
truncation_length = 30
truncation_symbol = "вҖҰ"

[git_status]
style = "bg:yellow"
format = '[[($conflicted$ahead_behind$staged$modified$deleted$untracked )](fg:crust bg:yellow)]($style)'
ahead      = "вҮЎ$count"
behind     = "вҮЈ$count"
diverged   = "вҮ•"
staged     = " +$count"
modified   = " ~$count"
untracked  = " ?$count"
deleted    = " -$count"
conflicted = " =$count"
renamed    = " В»$count"
stashed    = ""

# в”Җв”Җ Command duration в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

[cmd_duration]
min_time    = 2_000
format      = "  [$duration](overlay1)"

# в”Җв”Җ Prompt character в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

[character]
success_symbol = "[вқҜ](bold mauve)"
error_symbol   = "[вқҜ](bold red)"
vimcmd_symbol  = "[вқ®](bold green)"

# в”Җв”Җ JVM / Native в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

[java]
symbol = "оү– "
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'
detect_files = [
  "pom.xml",
  "build.gradle",
  "build.gradle.kts",
  "settings.gradle",
  "settings.gradle.kts",
  ".java-version",
]

[kotlin]
symbol = "оҳҙ"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[swift]
symbol = "у°ӣҘ"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

# в”Җв”Җ Web / Scripting в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

[nodejs]
symbol = "у°Һҷ"
style = "bg:sapphire"
format = '[[ $symbol( $version) ](fg:crust bg:sapphire)]($style)'
detect_files   = ["package.json", ".nvmrc", ".node-version"]
detect_folders = ["node_modules"]

[ruby]
symbol = "у°ҙӯ"
style = "bg:sapphire"
format = '[[ $symbol( $version) ](fg:crust bg:sapphire)]($style)'
detect_files = ["Gemfile", "Fastfile", ".ruby-version"]

[python]
symbol = "у°Ң "
style = "bg:sapphire"
format = '[[ $symbol( $version) ](fg:crust bg:sapphire)]($style)'

# в”Җв”Җ Misc Languages вҖ” remove `disabled` line and move to right_format to activate в”Җв”Җв”Җв”Җ

